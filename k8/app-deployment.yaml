apiVersion: v1
kind: ConfigMap
metadata:
  name: expenses-config
  namespace: expenses
data:
  SPRING_DATASOURCE_URL: jdbc:mysql://expenses-mysql:3306/expenses_tracker
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_JPA_SHOW_SQL: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: expenses-tracker
  namespace: expenses
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expenses-tracker
  template:
    metadata:
      labels:
        app: expenses-tracker
    spec:
      containers:
      - name: expenses-tracker
        # --- Replace this image line before applying ---
        image: $IMAGE_PLACEHOLDER
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: expenses-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_USER
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_PASSWORD
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: expenses-tracker
  namespace: expenses
spec:
  selector:
    app: expenses-tracker
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
